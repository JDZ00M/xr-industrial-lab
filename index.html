<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

    <!-- VR joystick -->
    <script src="https://unpkg.com/aframe-thumbstick-controls-component@3.0.1/dist/aframe-thumbstick-controls-component.min.js"></script>

    <!-- Movimiento táctil personalizado -->
    <script>
      AFRAME.registerComponent('touch-move', {
        schema: { speed: { default: 0.05 } },

        init: function () {
          this.moving = false;

          window.addEventListener('touchstart', () => {
            this.moving = true;
          });

          window.addEventListener('touchend', () => {
            this.moving = false;
          });
        },

        tick: function () {
          if (!this.moving) return;

          const direction = new THREE.Vector3();
          this.el.object3D.getWorldDirection(direction);
          this.el.object3D.position.add(direction.multiplyScalar(this.data.speed));
        }
      });
    </script>
  </head>

  <body>
    <a-scene>

      <!-- ===== RIG MULTIPLATAFORMA ===== -->
      <a-entity id="rig" position="0 1.6 2"
        wasd-controls="acceleration: 20"
        touch-move="speed: 0.07">

        <!-- Cámara -->
        <a-entity camera look-controls></a-entity>

        <!-- Control izquierdo (movimiento VR) -->
        <a-entity 
          laser-controls="hand: left"
          thumbstick-controls="movementSpeed: 3">
        </a-entity>

        <!-- Control derecho -->
        <a-entity laser-controls="hand: right"></a-entity>

      </a-entity>

      <!-- Assets -->
      <a-assets>
        <a-asset-item id="modelo" src="models/r2d2.glb"></a-asset-item>
      </a-assets>

      <!-- Piso -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

      <!-- Paredes -->
      <a-box position="0 3 -10" width="20" height="6" depth="0.2" color="#cccccc"></a-box>
      <a-box position="-10 3 0" width="0.2" height="6" depth="20" color="#cccccc"></a-box>
      <a-box position="10 3 0" width="0.2" height="6" depth="20" color="#cccccc"></a-box>

      <!-- Techo -->
      <a-box position="0 6 0" width="20" height="0.2" depth="20" color="#aaaaaa"></a-box>

      <!-- Modelo GLB -->
      <a-entity 
        gltf-model="#modelo" 
        position="-1 0 -8"
        scale="0.25 0.25 0.25">
      </a-entity>

      <!-- TANQUE 1 -->
      <a-entity position="-6 0 -2">
        <a-cylinder position="0 1 0" radius="0.8" height="2" color="#888"></a-cylinder>
        <a-cylinder position="0 2 0" radius="0.82" height="0.1" color="#666"></a-cylinder>
        <a-cylinder position="0 0.1 0" radius="0.9" height="0.2" color="#444"></a-cylinder>

        <a-sphere position="0.8 1.5 0" radius="0.15" color="red"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800">
        </a-sphere>
      </a-entity>

      <!-- TANQUE 2 -->
      <a-entity position="6 0 -2">
        <a-cylinder position="0 1 0" radius="0.8" height="2" color="#888"></a-cylinder>
        <a-cylinder position="0 2 0" radius="0.82" height="0.1" color="#666"></a-cylinder>
        <a-cylinder position="0 0.1 0" radius="0.9" height="0.2" color="#444"></a-cylinder>

        <a-sphere position="-0.8 1.5 0" radius="0.15" color="blue"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800">
        </a-sphere>
      </a-entity>

      <!-- Iluminación -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="2 4 2" intensity="0.8"></a-light>

      <!-- Cielo -->
      <a-sky color="#ECECEC"></a-sky>

    </a-scene>
  </body>
</html>
