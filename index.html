<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

    <script>
      AFRAME.registerComponent('conveyor-belt', {
        schema: {
          speed:    { default: 0.8 },
          length:   { default: 6 },
          width:    { default: 1.2 },
          interval: { default: 2200 }
        },

        init: function () {
          this.boxes   = [];
          this.timer   = 0;
          this.beltLen = this.data.length;
          this.beltTop = 0.18;

          this._buildBelt();
          this._spawnBox();
        },

        _buildBelt: function () {
          const el = this.el;
          const d  = this.data;

          const base = document.createElement('a-box');
          base.setAttribute('width',  d.width);
          base.setAttribute('height', 0.1);
          base.setAttribute('depth',  d.length);
          base.setAttribute('position', '0 0 0');
          base.setAttribute('color', '#888');
          el.appendChild(base);

          const surf = document.createElement('a-box');
          surf.setAttribute('width',  d.width - 0.06);
          surf.setAttribute('height', 0.025);
          surf.setAttribute('depth',  d.length - 0.06);
          surf.setAttribute('position', '0 0.063 0');
          surf.setAttribute('color', '#444');
          el.appendChild(surf);

          const slats = Math.floor(d.length / 0.35);
          for (let i = 0; i < slats; i++) {
            const z = -d.length / 2 + 0.2 + i * (d.length / slats);
            const slat = document.createElement('a-box');
            slat.setAttribute('width',  d.width - 0.08);
            slat.setAttribute('height', 0.01);
            slat.setAttribute('depth',  0.04);
            slat.setAttribute('position', `0 0.078 ${z.toFixed(3)}`);
            slat.setAttribute('color', '#666');
            el.appendChild(slat);
          }

          [-d.length / 2 + 0.08, d.length / 2 - 0.08].forEach(z => {
            const r = document.createElement('a-cylinder');
            r.setAttribute('radius', 0.08);
            r.setAttribute('height', d.width);
            r.setAttribute('rotation', '0 0 90');
            r.setAttribute('position', `0 0.05 ${z.toFixed(3)}`);
            r.setAttribute('color', '#aaa');
            el.appendChild(r);
          });

          [
            [-d.width / 2 + 0.12, -d.length / 2 + 0.18],
            [ d.width / 2 - 0.12, -d.length / 2 + 0.18],
            [-d.width / 2 + 0.12,  d.length / 2 - 0.18],
            [ d.width / 2 - 0.12,  d.length / 2 - 0.18],
          ].forEach(([x, z]) => {
            const leg = document.createElement('a-cylinder');
            leg.setAttribute('radius', 0.04);
            leg.setAttribute('height', 0.75);
            leg.setAttribute('position', `${x} -0.42 ${z}`);
            leg.setAttribute('color', '#777');
            el.appendChild(leg);
          });
        },

        _spawnBox: function () {
          const colors = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
          const color  = colors[Math.floor(Math.random() * colors.length)];
          const s      = 0.17 + Math.random() * 0.15;

          const box = document.createElement('a-box');
          box.setAttribute('width',  s);
          box.setAttribute('height', s);
          box.setAttribute('depth',  s);
          box.setAttribute('color',  color);

          const startZ = -this.beltLen / 2 + 0.05;
          box.object3D.position.set(
            (Math.random() - 0.5) * (this.data.width * 0.4),
            this.beltTop,
            startZ
          );
          this.el.appendChild(box);
          this.boxes.push({ el: box, z: startZ, fading: false });
        },

tick: function (time, delta) {
  if (!delta) return;
  const dt   = delta / 1000;
  const endZ = (this.beltLen / 2 + 0.4)-0.65;

  for (let i = this.boxes.length - 1; i >= 0; i--) {
    const b = this.boxes[i];

    if (b.fading) continue;

    b.z += this.data.speed * dt;
    b.el.object3D.position.z = b.z;

    if (b.z >= endZ) {
      b.fading = true;
      b.el.setAttribute('material', 'transparent: true; opacity: 1');
      b.el.setAttribute('animation',
        'property: material.opacity; to: 0; dur: 400; easing: linear');

      setTimeout((box) => {
        box.el.parentNode && box.el.parentNode.removeChild(box.el);
        const pos = this.boxes.indexOf(box);
        if (pos !== -1) this.boxes.splice(pos, 1);
      }, 420, b);   // ← se pasa 'b' como argumento para evitar closure stale
    }
  }

  this.timer += delta;
  if (this.timer >= this.data.interval) {
    this.timer = 0;
    this._spawnBox();
  }
}
      });
    </script>
  </head>

  <body>
    <a-scene>

      <!-- RIG -->
      <a-entity id="rig"
        position="0 0 4"
        movement-controls="speed: 0.15">

        <a-entity camera position="0 1.6 -2" look-controls></a-entity>
        <a-entity laser-controls="hand: left"></a-entity>
        <a-entity laser-controls="hand: right"></a-entity>

      </a-entity>

      <!-- Assets -->
      <a-assets>
        <a-asset-item id="modelo" src="models/r2d2.glb"></a-asset-item>
      </a-assets>

      <!-- Piso -->
      <a-plane rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

      <!-- Paredes -->
      <a-box position="0 3 -10"  width="20"  height="6" depth="0.2"  color="#cccccc"></a-box>
      <a-box position="-10 3 0"  width="0.2" height="6" depth="20"   color="#cccccc"></a-box>
      <a-box position="10 3 0"   width="0.2" height="6" depth="20"   color="#cccccc"></a-box>
      <a-box position="0 3 10"   width="20"  height="6" depth="0.2"  color="#cccccc"></a-box>

      <!-- Techo -->
      <a-box position="0 6 0" width="20" height="0.2" depth="20" color="#aaaaaa"></a-box>

      <!-- Modelo GLB -->
      <a-entity
        gltf-model="#modelo"
        position="-1 0 -8"
        scale="0.25 0.25 0.25">
      </a-entity>

      <!-- CINTA TRANSPORTADORA -->
      <a-entity
        conveyor-belt="speed: 1; length: 6; width: 1.2; interval: 1500"
        position="0 0.45 7"
        rotation="0 90 0">
      </a-entity>

      <!-- TANQUE 1 -->
      <a-entity position="-6 0 -2">
        <a-cylinder position="0 1 0"   radius="0.8"  height="2"   color="#888"></a-cylinder>
        <a-cylinder position="0 2 0"   radius="0.82" height="0.1" color="#666"></a-cylinder>
        <a-cylinder position="0 0.1 0" radius="0.9"  height="0.2" color="#444"></a-cylinder>
        <a-sphere position="0.8 1.5 0" radius="0.15" color="red"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800">
        </a-sphere>
      </a-entity>

      <!-- TANQUE 2 -->
      <a-entity position="6 0 -2">
        <a-cylinder position="0 1 0"    radius="0.8"  height="2"   color="#888"></a-cylinder>
        <a-cylinder position="0 2 0"    radius="0.82" height="0.1" color="#666"></a-cylinder>
        <a-cylinder position="0 0.1 0"  radius="0.9"  height="0.2" color="#444"></a-cylinder>
        <a-sphere position="-0.8 1.5 0" radius="0.15" color="blue"
          animation="property: scale; to: 1.2 1.2 1.2; dir: alternate; loop: true; dur: 800">
        </a-sphere>
      </a-entity>

      <!-- Iluminación -->
      <a-light type="ambient" intensity="0.5"></a-light>
      <a-light type="directional" position="2 4 2" intensity="0.8"></a-light>

      <!-- Cielo -->
      <a-sky color="#ECECEC"></a-sky>

    </a-scene>
  </body>
</html>
